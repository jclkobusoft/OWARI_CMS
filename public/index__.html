<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitio en Inventario</title>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">

    <style>
        body,
        html {
            height: 100%;
            background-color: #e9ecef;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .bg-full-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #2c3e50 0%, #4ca1af 100%);
        }

        .card-inventory {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 90%;
            padding: 40px;
            background: white;
            text-align: center;
        }

        .icon-container {
            margin-bottom: 20px;
            color: #f39c12;
            /* Color naranja inventario */
        }

        .icon-container i {
            font-size: 80px;
            animation: pulse 2s infinite;
        }

        h1 {
            font-weight: 700;
            color: #333;
            margin-bottom: 15px;
        }

        p {
            color: #666;
            font-size: 1.1rem;
            margin-bottom: 30px;
        }

        .btn-contact {
            background-color: #2c3e50;
            color: white;
            padding: 10px 25px;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s;
        }

        .btn-contact:hover {
            background-color: #34495e;
            color: #fff;
            transform: translateY(-2px);
            text-decoration: none;
        }

        .footer-text {
            margin-top: 30px;
            font-size: 0.8rem;
            color: #999;
        }

        /* Animación sutil para el icono */
        @keyframes pulse {
            0% {
                transform: scale(1);
            }

            50% {
                transform: scale(1.1);
            }

            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <div class="bg-full-screen">
        <div class="card-inventory">
            <div class="icon-container">
                <img src="https://owari.com.mx/upload/gral/general-Owari_007.png" alt="Logo">
            </div>

            <h1>¡Estamos en Inventario!</h1>

            <p>
                En este momento estamos realizando el conteo anual de mercancía para asegurar la precisión de nuestro
                stock.
                <br><br>
                <strong>Volveremos a estar operativos en breve.</strong>
            </p>

            <div class="progress mb-4" style="height: 5px;">
                <div class="progress-bar progress-bar-striped progress-bar-animated bg-warning" role="progressbar"
                    style="width: 75%"></div>
            </div>

            <a href="mailto:sistemas@owari.com.mx" class="btn btn-contact">
                <i class="far fa-envelope"></i> Contactar Soporte
            </a>

            <div class="footer-text">
                &copy; 2025 OWARI Autopartes. Todos los derechos reservados.
            </div>
        </div>
    </div>

</body>

</html>
